<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages – MyHomeMistri</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">🏠</div>
      My<span class="accent">Home</span>Mistri
    </a>
    <ul class="nav-links">
      <li><a href="providers.html" class="nav-link">Providers</a></li>
      <li><a href="user-dashboard.html" class="nav-link">Dashboard</a></li>
      <li><a href="chat.html" class="nav-link active">Messages</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn btn-ghost btn-sm" onclick="AuthState.logout()">Logout</button>
    </div>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="nav-overlay" id="navOverlay"></div>
<div class="nav-drawer" id="navDrawer">
  <a href="providers.html" class="nav-link">Providers</a>
  <a href="user-dashboard.html" class="nav-link">Dashboard</a>
  <a href="chat.html" class="nav-link active">Messages</a>
  <div class="nav-actions">
    <button class="btn btn-outline" onclick="AuthState.logout()">Logout</button>
  </div>
</div>

<main class="chat-page">
  <div class="chat-layout">
    <aside class="conversations-sidebar">
      <div class="sidebar-chat-header">
        <h2>Messages</h2>
        <div class="chat-search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="chat-search-input" id="conversationSearch" placeholder="Search conversations...">
        </div>
      </div>
      <div class="conversations-list" id="conversationsList"></div>
    </aside>

    <section class="chat-window" id="chatWindow">
      <div class="chat-window-empty" id="chatWindowEmpty">
        <div class="empty-icon">💬</div>
        <h3>Select a conversation</h3>
        <p>Choose a conversation from the left to start messaging.</p>
      </div>

      <div id="chatBody" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <header class="chat-window-header" id="chatWindowHeader">
          <button class="mobile-back-btn" id="mobileBackBtn" type="button">← Back</button>
          <div class="avatar">?</div>
          <div class="chat-header-info">
            <div class="chat-header-name">Select a conversation</div>
            <div class="chat-header-status"><span class="status-dot"></span> Active</div>
          </div>
          <div class="chat-header-actions" id="chatHeaderActions"></div>
        </header>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <label class="chat-attach-btn" id="chatAttachBtn" for="chatAttachmentInput" title="Attach file">📎</label>
            <input type="file" id="chatAttachmentInput" accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.webp,.gif,.zip,.rar" style="display:none">
            <textarea class="chat-text-input" id="chatInput" placeholder="Type your message..." rows="1"></textarea>
            <button class="chat-send-btn" id="chatSendBtn" type="button">➤</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</main>

<div class="toast-container"></div>
<script src="js/global.js"></script>
<script src="js/chat-page.js"></script>
</body>
</html>
